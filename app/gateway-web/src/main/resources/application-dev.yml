# 开发环境配置
# 只包含 Nacos 连接配置和必要的基础配置
# 其他配置（Redis、Sentinel、路由等）请在 Nacos 配置中心配置

spring:
  config:
    import: "optional:nacos:"  # 可选的 Nacos 配置导入

  cloud:
    nacos:
      # 服务注册与发现配置
      discovery:
        server-addr: 10.42.0.125:8848
        enabled: true
        register-enabled: true
        service: kip-gateway
        group: DEFAULT_GROUP
        namespace: "public"

      # 配置中心配置
      config:
        server-addr: 10.42.0.125:8848
        enabled: true
        import-check:
          enabled: false  # 禁用配置导入检查
        file-extension: yml
        group: DEFAULT_GROUP
        namespace: "public"
        refresh-enabled: true  # 启用配置自动刷新

server:
  port: 9527

# 日志配置（本地文件）
logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
    xyz.kip: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: logs/gateway.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30
