# 开发环境配置
# 只包含 Nacos 连接配置和必要的基础配置
# 其他配置（Redis、Sentinel、路由等）请在 Nacos 配置中心配置
server:
  port: 9527

# 日志配置（本地文件）
logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
    xyz.kip: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: logs/gateway.log
  logback:
    rolling policy:
      max-file-size: 100MB
      max-history: 30
