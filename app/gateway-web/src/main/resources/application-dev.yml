# 开发环境配置
spring:
  cloud:
    nacos:
      discovery:
        server-addr: 10.42.0.125:8848
        enabled: true
        register-enabled: true
        service: kip-gateway
        group: DEFAULT_GROUP
        namespace: ""
      config:
        server-addr: 10.42.0.125:8848
        enabled: true
        file-extension: yml
        group: DEFAULT_GROUP
        namespace: ""

    sentinel:
      enabled: true
      transport:
        dashboard: 10.42.0.125:8080
        port: 8719

server:
  port: 9527

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
    xyz.kip: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: logs/gateway.log
  logback:
    rolling policy:
      max-file-size: 100MB
      max-history: 30
