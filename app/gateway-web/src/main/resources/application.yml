# 通用配置 - 所有环境共享
# 环境特定配置请查看 application-dev.yml 和 application-prod.yml
# 动态配置（路由、规则等）请查看 nacos-todo.yml（需上传到 Nacos 配置中心）

spring:
  profiles:
    active: dev
  application:
    name: kip-gateway
  config:
    import:
      - nacos:${spring.application.name}-${spring.profiles.active}.yml  # 可选的 Nacos 配置导入

  cloud:
    nacos:
      # 服务注册与发现配置
      discovery:
        server-addr: 10.42.0.125:8848
        register-enabled: true
        group: DEFAULT_GROUP
        namespace: ""

      config:
        server-addr: 10.42.0.125:8848
        file-extension: yml
        group: DEFAULT_GROUP
        namespace: ""
        refresh-enabled: true
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
  jackson:
    default-property-inclusion: non_empty
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

server:
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway,prometheus
  endpoint:
    health:
      show-details: always
    gateway:
      access: unrestricted
  prometheus:
    metrics:
      export:
        enabled: true
