spring:
  profiles:
    active: dev
  application:
    name: kip-gateway
  config:
    import:
      - optional:nacos:${spring.application.name}-${spring.profiles.active}.yml

  cloud:
    nacos:
      discovery:
        server-addr: 10.42.0.125:8848
        register-enabled: true
        group: DEFAULT_GROUP
        namespace: ""
      config:
        server-addr: 10.42.0.125:8848
        file-extension: yml
        group: DEFAULT_GROUP
        namespace: ""
        refresh-enabled: true

    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true

  jackson:
    default-property-inclusion: non_empty
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

server:
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway,prometheus,refresh
  endpoint:
    health:
      show-details: always
    gateway:
      access: unrestricted
  prometheus:
    metrics:
      export:
        enabled: true
