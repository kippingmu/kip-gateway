# 通用配置 - 所有环境共享
# 环境特定配置请查看 application-dev.yml 和 application-prod.yml

spring:
  profiles:
    active: dev
  application:
    name: kip-gateway
  config:
    import:
      - optional:nacos:${spring.application.name}-${spring.profiles.active}.yml  # 可选的 Nacos 配置导入

  cloud:
    nacos:
      # 服务注册与发现配置
      discovery:
        server-addr: 10.42.0.125:8848
        register-enabled: true
        group: DEFAULT_GROUP
        namespace: ""
      config:
        server-addr: 10.42.0.125:8848
        file-extension: yml
        group: DEFAULT_GROUP
        namespace: ""
        refresh-enabled: true

    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          routes:
            # 本地默认路由兜底，和 Nacos 当前注册的 kip-app 服务保持一致。
            - id: kip-app-service
              uri: lb://kip-app
              predicates:
                - Path=/api/app/**
              filters:
                - name: StripPrefix
                  args:
                    parts: 2
              order: 1

  jackson:
    default-property-inclusion: non_empty
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

server:
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway,prometheus
  endpoint:
    health:
      show-details: always
    gateway:
      access: unrestricted
  prometheus:
    metrics:
      export:
        enabled: true
