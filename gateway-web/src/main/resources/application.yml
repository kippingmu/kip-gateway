spring:
  profiles:
    active: dev
  application:
    name: kip-gateway
  cloud:
    gateway:
      # 路由配置
      server:
        webflux:
          routes:
            - id: auth-service
              uri: lb://kip-auth-service
              predicates:
                - Path=/api/auth/**
              filters:
                - name: StripPrefix
                  args:
                    parts: 2
    nacos:
      discovery:
        server-addr: 10.42.0.125:8848
        enabled: true
        register-enabled: true
        service: kip-gateway
        group: DEFAULT_GROUP
        namespace: ""
      config:
        server-addr: 10.42.0.125:8848
        enabled: true
        file-extension: yml
        group: DEFAULT_GROUP
        namespace: ""
    sentinel: # Sentinel 总配置入口（Spring Cloud Alibaba）
      enabled: true                         # 是否启用 Sentinel 自动装配与拦截；true=启用限流/熔断等能力

      transport: # Sentinel 与 Dashboard 的通讯配置（监控上报/推送规则通道）
        dashboard: 10.42.0.125:8080         # Sentinel Dashboard 地址；用于展示监控、管理规则（可推送但生产更常用数据源）
        port: 8719                          # 本应用本机开放的 transport 通讯端口（Dashboard 连接/推送规则会用）
        # 若 8719 被占用，Sentinel 可能会自动尝试 +1 递增端口（视版本实现）

      datasource: # 规则数据源配置：把规则从外部系统加载进应用，并监听变更（推荐生产做法）
        nacos-degrade-rules: # 数据源名称（自定义 key）；通常用于区分不同规则集
          nacos: # 数据源类型：Nacos（配置中心作为规则存储与下发）
            server-addr: 10.42.0.125:8848   # Nacos 服务地址（规则从这里拉取/订阅）
            dataId: sentinel-degrade-rules  # Nacos 中该规则配置的 dataId（对应一份配置文件/配置项）
            groupId: DEFAULT_GROUP          # Nacos 配置分组（不写一般也是 DEFAULT_GROUP）
            rule-type: degrade              # 规则类型：degrade=熔断降级规则（RT/异常比例/异常数触发熔断）

        nacos-flow-rules: # 另一个数据源名称（自定义 key）
          nacos: # 同样是 Nacos 数据源
            server-addr: 10.42.0.125:8848   # Nacos 服务地址（可与上面复用）
            dataId: sentinel-flow-rules     # Nacos 中流控规则的 dataId
            groupId: DEFAULT_GROUP          # Nacos 配置分组
            rule-type: flow                 # 规则类型：flow=流控规则（QPS/并发线程数/调用关系等维度限流）

  jackson:
    default-property-inclusion: non_empty
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

server:
  port: 9527
  servlet:
    context-path: /

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
    xyz.kip: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: logs/gateway.log
    max-size: 100MB
    max-history: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway,prometheus
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true