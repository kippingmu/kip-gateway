spring:
  application:
    name: kip-gateway
  # Spring Cloud Gateway 配置
  cloud:
    gateway:
      # 启用网关
      enabled: true
      # 路由配置
      routes:
        # 示例路由：用户服务
        - id: user-service
          uri: lb://kip-user-service
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=2
        # 示例路由：订单服务
        - id: order-service
          uri: lb://kip-order-service
          predicates:
            - Path=/api/order/**
          filters:
            - StripPrefix=2
        # 示例路由：产品服务
        - id: product-service
          uri: lb://kip-product-service
          predicates:
            - Path=/api/product/**
          filters:
            - StripPrefix=2
      # 网关全局过滤器配置
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders:
              - "*"
            allow-credentials: true
            max-age: 3600
      # WebSocket支持
      default-filters:
        # 日志过滤器（自定义实现）
        - name: RequestLogging
    # Nacos 服务发现与注册配置
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        enabled: true
        register-enabled: true
        service: kip-gateway
        group: DEFAULT_GROUP
        namespace: ""
      # Nacos 配置中心
      config:
        server-addr: 127.0.0.1:8848
        enabled: true
        file-extension: yml
        group: DEFAULT_GROUP
        namespace: ""
        # 支持多个配置文件
        shared-configs:
          - dataId: gateway-routes.yml
            group: DEFAULT_GROUP
            refresh: true
    # Sentinel 限流降级配置
    sentinel:
      enabled: true
      transport:
        dashboard: 127.0.0.1:8080
        port: 8719
      datasource:
        nacos-degrade-rules:
          nacos:
            server-addr: 127.0.0.1:8848
            dataId: sentinel-degrade-rules
            groupId: DEFAULT_GROUP
            rule-type: degrade
        nacos-flow-rules:
          nacos:
            server-addr: 127.0.0.1:8848
            dataId: sentinel-flow-rules
            groupId: DEFAULT_GROUP
            rule-type: flow

  # Jackson 序列化配置
  jackson:
    default-property-inclusion: non_empty
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

# 服务端口
server:
  port: 8888
  servlet:
    context-path: /

# 日志配置
logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
    xyz.kip: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: logs/gateway.log
    max-size: 100MB
    max-history: 30

# Spring Boot Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway,prometheus
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

