# Spring Cloud Gateway 路由配置示例
# 这个文件用于 Nacos 配置中心，通过 gateway-routes.yml 的 dataId 共享
#
# 使用 Spring Cloud Gateway 2025.0.0 (Spring Cloud 2025.0.0) 的标准格式
# 避免过时的简写形式，全部使用显式配置

spring:
  cloud:
    gateway:
      # 路由列表
      routes:

        # ==================== 用户服务路由 ====================
        - id: user-service
          uri: lb://kip-user-service
          predicates:
            # 路径匹配：/api/user/** 开头的请求
            - Path=/api/user/**
            # HTTP 方法匹配：支持 GET、POST、PUT、DELETE
            - Method=GET,POST,PUT,DELETE
          filters:
            # 移除前 2 级路径，/api/user/xxx -> /xxx
            - name: StripPrefix
              args:
                parts: 2
            # 添加请求头
            - name: AddRequestHeader
              args:
                name: X-Gateway-Route
                value: user-service
            # 添加响应头
            - name: AddResponseHeader
              args:
                name: X-Gateway-Id
                value: kip-gateway
            # 请求超时设置（毫秒）
            - name: RequestRateLimiter
              args:
                key-resolver: '#{@userKeyResolver}'
                redis-rate-limiter.replenish-rate: 10
                redis-rate-limiter.requested-tokens: 1

        # ==================== 订单服务路由 ====================
        - id: order-service
          uri: lb://kip-order-service
          predicates:
            - Path=/api/order/**
            - Method=GET,POST,PUT,DELETE
          filters:
            - name: StripPrefix
              args:
                parts: 2
            - name: AddRequestHeader
              args:
                name: X-Gateway-Route
                value: order-service

        # ==================== 产品服务路由 ====================
        - id: product-service
          uri: lb://kip-product-service
          predicates:
            - Path=/api/product/**
            # 支持 HEAD 和 OPTIONS
            - Method=GET,POST,PUT,DELETE,HEAD,OPTIONS
          filters:
            - name: StripPrefix
              args:
                parts: 2
            - name: AddRequestHeader
              args:
                name: X-Gateway-Route
                value: product-service

        # ==================== 认证授权服务路由 ====================
        - id: auth-service
          uri: lb://kip-auth-service
          predicates:
            - Path=/api/auth/**
          filters:
            - name: StripPrefix
              args:
                parts: 2
            - name: AddRequestHeader
              args:
                name: X-Gateway-Route
                value: auth-service

        # ==================== 支付服务路由 ====================
        - id: payment-service
          uri: lb://kip-payment-service
          predicates:
            - Path=/api/payment/**
          filters:
            - name: StripPrefix
              args:
                parts: 2
            - name: AddRequestHeader
              args:
                name: X-Gateway-Route
                value: payment-service

        # ==================== 日志查询服务路由 ====================
        - id: log-service
          uri: lb://kip-log-service
          predicates:
            - Path=/api/logs/**
          filters:
            - name: StripPrefix
              args:
                parts: 2
            - name: AddRequestHeader
              args:
                name: X-Gateway-Route
                value: log-service

      # ==================== 全局过滤器配置 ====================
      # CORS 跨域配置已在 Java GatewayCorsConfig 中实现

      # ==================== 默认过滤器（应用于所有路由）====================
      default-filters:
        # 请求日志过滤器
        - name: RequestLogging
        # 请求 ID 生成过滤器
        - name: TraceId
        # Sentinel 限流降级过滤器
        - name: Sentinel

      # ==================== Gateway 全局配置 ====================
      # 启用 discovery client 支持
      discovery:
        locator:
          enabled: false
          lower-case-service-id: true

      # HTTP 客户端连接池配置
      httpclient:
        connect-timeout: 5000
        response-timeout: 30000
        ssl:
          useInsecureTrustManager: false

      # WebSocket 支持
      websocket:
        enabled: true

