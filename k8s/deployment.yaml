apiVersion: apps/v1
kind: Deployment
metadata:
  name: kip-gateway
  labels:
    app: kip-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kip-gateway
  template:
    metadata:
      labels:
        app: kip-gateway
    spec:
      containers:
        - name: kip-gateway
          image: your-registry/kip-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8888
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR
              value: "10.42.0.125:8848"
            - name: SPRING_CLOUD_NACOS_DISCOVERY_ENABLED
              value: "true"
            - name: SPRING_CLOUD_NACOS_DISCOVERY_REGISTER_ENABLED
              value: "true"
            - name: SPRING_CLOUD_SENTINEL_TRANSPORT_DASHBOARD
              value: "10.42.0.125:8080"
            # Uncomment if cluster environment restricts hostname lookup
            # - name: SPRING_CLOUD_CLIENT_HOSTNAME
            #   value: "localhost"
            # - name: SPRING_CLOUD_CLIENT_IP_ADDRESS
            #   value: "127.0.0.1"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /gateway/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /gateway/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6

