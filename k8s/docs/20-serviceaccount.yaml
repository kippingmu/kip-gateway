# ========================= 20-serviceaccount.yaml ========================= # 文件名建议：20-serviceaccount.yaml
apiVersion: v1 # K8s API 版本：v1
kind: ServiceAccount # 资源类型：服务账号（Pod 身份）
metadata: # 元数据
  name: demo-user-svc-sa # ServiceAccount 名称
  namespace: demo # 所在命名空间
  labels: # 通用标签
    app.kubernetes.io/name: demo-user-svc # 应用名
automountServiceAccountToken: false # 默认不挂载集群 token（更安全；需要访问 API 再打开）