# ========================= 11-secret.yaml ========================= # 文件名建议：11-secret.yaml
apiVersion: v1 # K8s API 版本：v1
kind: Secret # 资源类型：密钥（敏感配置）
metadata: # 元数据
  name: demo-user-svc-secret # Secret 名称
  namespace: demo # 所在命名空间
  labels: # 通用标签
    app.kubernetes.io/name: demo-user-svc # 应用名
type: Opaque # Secret 类型（通用）
stringData: # 直接写明文，K8s 会在存储时处理（生产仍建议外部密钥系统）
  DB_URL: "jdbc:postgresql://postgres.demo.svc.cluster.local:5432/userdb" # 数据库连接串（示例）
  DB_USERNAME: "user_app" # 数据库用户名（示例）
  DB_PASSWORD: "REPLACE_ME" # 数据库密码（请替换）
  API_TOKEN: "REPLACE_ME" # 外部 API token（示例）