version: '3.8'

services:
  # Nacos服务注册与配置中心
  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: nacos-server
    environment:
      MODE: standalone
      JVM_XMS: 512m
      JVM_XMX: 512m
      JVM_XMN: 256m
    ports:
      - "8848:8848"
      - "9848:9848"
    networks:
      - gateway-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/ns/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Sentinel控制台
  sentinel-dashboard:
    image: bladex/sentinel-dashboard:1.8.8
    container_name: sentinel-dashboard
    ports:
      - "8080:8080"
    networks:
      - gateway-network
    environment:
      SERVER_SERVLET_CONTEXT_PATH: /

  # Redis（可选，用于缓存）
  redis:
    image: redis:7-alpine
    container_name: redis-server
    ports:
      - "6379:6379"
    networks:
      - gateway-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Spring Cloud Gateway
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kip-gateway
    ports:
      - "8888:8888"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_SENTINEL_TRANSPORT_DASHBOARD: sentinel-dashboard:8080
    depends_on:
      nacos:
        condition: service_healthy
      sentinel-dashboard:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - gateway-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/gateway/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  gateway-network:
    driver: bridge

