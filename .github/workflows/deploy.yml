name: build-push-deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional image tag to deploy (default: current commit sha12)"
        required: false
        type: string
      nacos_action:
        description: "Nacos config action for the deploy run"
        required: false
        type: choice
        default: verify
        options:
          - verify
          - publish

concurrency:
  group: prod-deploy-kip-gateway
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux, prod]
    environment: prod
    permissions:
      contents: read
    env:
      DOCKER_BUILDKIT: "1"
      BUILDKIT_PROGRESS: plain
      IMAGE_REPO: registry.cn-hangzhou.aliyuncs.com/kip-app/kip-gateway
      K8S_NAMESPACE: kip-poc
      IMAGE_PULL_SECRET_NAME: kip-acr-pull
      K8S_DEPLOYMENT: kip-gateway
      K8S_SERVICE: kip-gateway
      K8S_MANIFEST_DIR: ./deploy/k8s
      ROLLOUT_TIMEOUT: 180s
      NACOS_ADDR: 10.42.0.125:8848
      NACOS_GROUP: K8S_POC
      NACOS_NAMESPACE: 74a3fe73-35c1-474e-ade8-9bc460b3f398
      NACOS_DATA_ID: kip-gateway-k8s.yml

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Resolve image variables
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_TAG_INPUT="${{ github.event.inputs.image_tag }}"
          if [ -n "${IMAGE_TAG_INPUT}" ]; then
            IMAGE_TAG="${IMAGE_TAG_INPUT}"
          else
            IMAGE_TAG="${GITHUB_SHA::12}"
          fi

          NACOS_ACTION="${{ github.event_name == 'workflow_dispatch' && inputs.nacos_action || 'publish' }}"

          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"
          echo "FULL_IMAGE=${IMAGE_REPO}:${IMAGE_TAG}" >> "$GITHUB_ENV"
          echo "NACOS_ACTION=${NACOS_ACTION}" >> "$GITHUB_ENV"
          echo "Deploy action: ${NACOS_ACTION}"

      - name: Docker login to ACR
        shell: bash
        run: |
          set -euo pipefail
          REGISTRY_USERNAME="${{ secrets.ALIYUN_REGISTRY_USERNAME }}"
          REGISTRY_PASSWORD="${{ secrets.ALIYUN_REGISTRY_PASSWORD }}"

          if [ -n "${REGISTRY_USERNAME}" ] && [ -n "${REGISTRY_PASSWORD}" ]; then
            echo "${REGISTRY_PASSWORD}" | docker login registry.cn-hangzhou.aliyuncs.com -u "${REGISTRY_USERNAME}" --password-stdin
          else
            echo "Registry secrets not configured; reusing existing docker login on runner host"
          fi

      - name: Ensure K8s image pull secret
        shell: bash
        run: |
          set -euo pipefail
          REGISTRY_USERNAME="${{ secrets.ALIYUN_REGISTRY_USERNAME }}"
          REGISTRY_PASSWORD="${{ secrets.ALIYUN_REGISTRY_PASSWORD }}"

          if [ -z "${REGISTRY_USERNAME}" ] || [ -z "${REGISTRY_PASSWORD}" ]; then
            echo "Registry secrets not configured; reusing existing image pull secret in ${K8S_NAMESPACE}"
            exit 0
          fi

          kubectl get namespace "${K8S_NAMESPACE}" >/dev/null 2>&1 || kubectl create namespace "${K8S_NAMESPACE}"
          kubectl -n "${K8S_NAMESPACE}" create secret docker-registry "${IMAGE_PULL_SECRET_NAME}" \
            --docker-server="registry.cn-hangzhou.aliyuncs.com" \
            --docker-username="${REGISTRY_USERNAME}" \
            --docker-password="${REGISTRY_PASSWORD}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Prepare kip-open-common for docker build
        shell: bash
        run: |
          set -euo pipefail
          DEP_DIR="$HOME/.m2/repository/xyz/kip/kip-open-common/1.0-SNAPSHOT"
          test -f "$DEP_DIR/kip-open-common-1.0-SNAPSHOT.jar"
          test -f "$DEP_DIR/kip-open-common-1.0-SNAPSHOT.pom"

          mkdir -p deps
          cp "$DEP_DIR/kip-open-common-1.0-SNAPSHOT.jar" deps/
          cp "$DEP_DIR/kip-open-common-1.0-SNAPSHOT.pom" deps/
          ls -lh deps/

      - name: Build image
        shell: bash
        run: |
          set -euo pipefail
          docker build --progress=plain -t "${FULL_IMAGE}" .

      - name: Push image
        shell: bash
        run: |
          set -euo pipefail
          docker push "${FULL_IMAGE}"

      - name: Sync Nacos config
        shell: bash
        env:
          NACOS_USER: ${{ secrets.NACOS_USER }}
          NACOS_PASS: ${{ secrets.NACOS_PASS }}
        run: |
          set -euo pipefail
          CONFIG_FILE="${GITHUB_WORKSPACE}/deploy/k8s/nacos/kip-gateway-k8s.yml"

          if [ "${NACOS_ACTION}" = "publish" ]; then
            if ./scripts/ops/nacos-config.sh verify "${NACOS_DATA_ID}" "${CONFIG_FILE}"; then
              echo "Nacos config already matches repo state"
            else
              echo "Nacos config drift detected; publishing repo state to Nacos"
              ./scripts/ops/nacos-config.sh put "${NACOS_DATA_ID}" "${CONFIG_FILE}"
            fi
          else
            ./scripts/ops/nacos-config.sh verify "${NACOS_DATA_ID}" "${CONFIG_FILE}"
          fi

      - name: Apply K8s secret
        shell: bash
        env:
          REDIS_PASSWORD: ${{ secrets.KIP_GATEWAY_REDIS_PASSWORD }}
          AUTH_JWT_SECRET: ${{ secrets.KIP_GATEWAY_AUTH_JWT_SECRET }}
        run: |
          set -euo pipefail
          ./scripts/ops/k8s-secret.sh auto

      - name: Capture current deployment image
        shell: bash
        run: |
          set -euo pipefail
          PREVIOUS_IMAGE=""
          if kubectl -n "${K8S_NAMESPACE}" get deployment "${K8S_DEPLOYMENT}" >/dev/null 2>&1; then
            PREVIOUS_IMAGE="$(kubectl -n "${K8S_NAMESPACE}" get deployment "${K8S_DEPLOYMENT}" -o jsonpath='{.spec.template.spec.containers[0].image}')"
          fi

          echo "PREVIOUS_IMAGE=${PREVIOUS_IMAGE}" >> "$GITHUB_ENV"

      - name: Apply K8s manifests
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/ops/k8s-apply.sh

      - name: Smoke verify
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/ops/k8s-smoke.sh

      - name: Rollback on failure
        if: failure() && env.PREVIOUS_IMAGE != ''
        shell: bash
        run: |
          set -euo pipefail
          kubectl -n "${K8S_NAMESPACE}" set image "deployment/${K8S_DEPLOYMENT}" "${K8S_DEPLOYMENT}=${PREVIOUS_IMAGE}"
          kubectl -n "${K8S_NAMESPACE}" rollout status "deployment/${K8S_DEPLOYMENT}" --timeout="${ROLLOUT_TIMEOUT}"

      - name: Docker logout
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          REGISTRY_USERNAME="${{ secrets.ALIYUN_REGISTRY_USERNAME }}"
          REGISTRY_PASSWORD="${{ secrets.ALIYUN_REGISTRY_PASSWORD }}"

          if [ -n "${REGISTRY_USERNAME}" ] && [ -n "${REGISTRY_PASSWORD}" ]; then
            docker logout registry.cn-hangzhou.aliyuncs.com || true
          else
            echo "Skipping docker logout because workflow reused runner host login"
          fi
