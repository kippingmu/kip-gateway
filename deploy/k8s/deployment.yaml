apiVersion: apps/v1
kind: Deployment
metadata:
  name: kip-gateway
  labels:
    app: kip-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kip-gateway
  template:
    metadata:
      labels:
        app: kip-gateway
    spec:
      containers:
        - name: kip-gateway
          image: kip-gateway:k8s-poc-local
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 9527
          envFrom:
            - configMapRef:
                name: kip-gateway-config
            - secretRef:
                name: kip-gateway-secret
                optional: true
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            failureThreshold: 30
            periodSeconds: 5
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
      nodeSelector:
        kubernetes.io/hostname: ubuntu
      terminationGracePeriodSeconds: 45
