spring:
  cloud:
    sentinel:
      enabled: false
    gateway:
      server:
        webflux:
          routes:
            - id: auth-api
              uri: ${KIP_AUTH_BASE_URL:http://kip-auth:5001}
              predicates:
                - Path=/api/auth/**
            - id: kip-auth
              uri: ${KIP_AUTH_BASE_URL:http://kip-auth:5001}
              predicates:
                - Path=/kip-auth/**
              filters:
                - StripPrefix=1
            - id: app-api
              uri: ${KIP_APP_BASE_URL:http://kip-app:8010}
              predicates:
                - Path=/api/app/**
            - id: kip-api
              uri: ${KIP_APP_BASE_URL:http://kip-app:8010}
              predicates:
                - Path=/api/kip/**
            - id: kip-app
              uri: ${KIP_APP_BASE_URL:http://kip-app:8010}
              predicates:
                - Path=/kip-app/**
              filters:
                - StripPrefix=1
  data:
    redis:
      host: ${REDIS_HOST:10.42.0.124}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5s
      connect-timeout: 5s

gateway:
  oauth2:
    enabled: false
  auth:
    whitelist: /actuator/**,/gateway/**,/api/auth/**,/api/auth/login,/api/auth/register,/api/auth/health,/api/auth/health/**,/kip-auth/api/auth/login,/kip-auth/api/auth/register,/kip-auth/api/auth/health,/kip-auth/actuator/**,/kip-app/actuator/**

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: INFO
    xyz.kip: INFO

management:
  tracing:
    enabled: true
    sampling:
      probability: 1.0
    export:
      zipkin:
        endpoint: ${MANAGEMENT_TRACING_EXPORT_ZIPKIN_ENDPOINT:http://10.42.0.125:9411/api/v2/spans}
